  Route-guarded: requires cu.role === 'user'. If the visitor isn't signed in,
  common.js's requireAuth() bounces them to /?openLogin=1&next=/dashboard so
  they get the login modal and return here after sign-in. If they ARE signed
  in but with a different role (broker/owner/builder/admin), requireAuth
  redirects them to the SPA homepage — they have a different dashboard.

  This page reuses common.js + app.js (which provides renderDash, gInq, gL,
  loadFavs, etc.). It opts out of the SPA bootstrap via <body data-page="dashboard">.

  Crawler-unfriendly intentionally: this is private user data behind auth, and
  the noindex meta tag tells search engines to ignore it.
-->

<!--
  Page-specific bootstrap. The route guard runs first — anyone not logged in
  as a regular user is redirected away. Then we wait for renderDash to be
  available (loaded from app.js) and call it.
-->
<script defer>
(function(){
  async function boot(){
    // Wait for common.js to finish auth bootstrap and expose requireAuth.
    var tries=0;
    while(typeof requireAuth!=='function'&&tries<50){
      await new Promise(function(r){setTimeout(r,40);});
      tries++;
    }
    if(typeof requireAuth!=='function'){
      // common.js failed to load — bail to homepage so the user isn't stuck.
      window.location.replace('/');
      return;
    }
    // Route guard: only role 'user' belongs here. Other roles get redirected
    // to /lister (listers) or / (admin uses SPA). requireAuth handles the
    // not-signed-in case by redirecting to /?openLogin=1&next=/dashboard.
    try {
      await requireAuth(['user']);
    } catch(e) {
      // requireAuth threw — it already triggered a redirect. Bail.
      return;
    }
    // Wait for app.js to expose renderDash.
    tries=0;
    while(typeof renderDash!=='function'&&tries<50){
      await new Promise(function(r){setTimeout(r,40);});
      tries++;
    }
    if(typeof renderDash!=='function'){
      console.warn('renderDash not defined — app.js failed to load');
      return;
    }
    // Load favorites + inquiries data, then render.
    if(typeof loadFavs==='function')await loadFavs();
    if(typeof loadNotifs==='function')await loadNotifs();
    upNav();
    await renderDash();
    // Tenant profile section — wait for tenant-profile.js to expose its init
    // function (it loads with defer, may not be ready immediately).
    var tpTries=0;
    while(typeof window.initTenantProfile!=='function'&&tpTries<50){
      await new Promise(function(r){setTimeout(r,40);});
      tpTries++;
    }
    if(typeof window.initTenantProfile==='function'){
      try { await window.initTenantProfile(); }
      catch(e){ console.warn('Tenant profile init failed:', e); }
    }
  }

  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',boot);
  } else {
    boot();
  }
})();
</script>
