<!--
  lister.html — "My Listings" dashboard for owners, brokers, and builders
  (Session 3 of MPA refactor).

  Route-guarded: requires cu.role in [owner, broker, builder]. Anyone else
  gets redirected away.

  Reuses common.js + app.js (renderLister, gL, gInq, etc.). Opts out of the
  SPA bootstrap via <body data-page="lister">.

  Note on "+ New Listing" button: the listing wizard modal (addM) lives in
  index.html only. Clicking the button on this page fires openM('addM') →
  the modal isn't found → openM's redirect fallback sends the user to
  /?openPost=1, where the SPA opens the wizard. After saving, the SPA
  navigates to /lister via go('lister') which currently redirects to the
  hash route — see Session 4 follow-up to make this fully seamless.
-->

<script defer>
(function(){
  async function boot(){
    var tries=0;
    while(typeof requireAuth!=='function'&&tries<50){
      await new Promise(function(r){setTimeout(r,40);});
      tries++;
    }
    if(typeof requireAuth!=='function'){
      window.location.replace('/');
      return;
    }
    // Route guard: only owner / broker / builder belong here. Regular users
    // get bounced to /dashboard, admins to /. requireAuth handles the
    // not-signed-in case via /?openLogin=1&next=/lister.
    try {
      await requireAuth(['owner','broker','builder']);
    } catch(e) {
      return;
    }
    // Wait for app.js's renderLister.
    tries=0;
    while(typeof renderLister!=='function'&&tries<50){
      await new Promise(function(r){setTimeout(r,40);});
      tries++;
    }
    if(typeof renderLister!=='function'){
      console.warn('renderLister not defined');
      return;
    }
    if(typeof loadFavs==='function')await loadFavs();
    if(typeof loadNotifs==='function')await loadNotifs();
    upNav();
    await renderLister();
  }

  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',boot);
  } else {
    boot();
  }
})();
</script>
</body>
</html>
