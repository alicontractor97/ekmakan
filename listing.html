        '<div style="font-size:42px;color:var(--mu);margin-bottom:14px;">⚠</div>'+
        '<h2 style="font-family:\'Playfair Display\',serif;color:var(--ink);margin-bottom:6px;">Listing unavailable</h2>'+
        '<p style="color:var(--mu);">'+msg+'</p>'+
        '<a href="/" style="display:inline-block;margin-top:18px;padding:10px 22px;background:var(--t);color:#fff;border-radius:8px;text-decoration:none;font-weight:700;">Return home</a>'+
      '</div>';
    }
    var t=document.getElementById('vTit');if(t)t.textContent='Listing unavailable';
    document.title='Listing unavailable · Ek Makān';
  }
  function patchMeta(){
    var t=document.getElementById('vTit');
    if(!t||t.textContent==='Loading…')return;
    var title=t.textContent.trim();
    if(!title)return;
    document.title=title+' · Ek Makān';
    var setMeta=function(id,v){var e=document.getElementById(id);if(e)e.setAttribute('content',v);};
    setMeta('ogTitle',title+' · Ek Makān');
    setMeta('twTitle',title+' · Ek Makān');
    var firstImg=document.querySelector('#vCnt img[src]');
    if(firstImg&&firstImg.src){
      setMeta('ogImage',firstImg.src);
      setMeta('twImage',firstImg.src);
    }
  }
  async function boot(){
    var id=getListingId();
    if(!id){showError('No listing ID in the URL. The link may be broken.');return;}
    // Wait for viewL to be available (app.js loads with defer)
    var tries=0;
    while(typeof viewL!=='function'&&tries<60){
      await new Promise(function(r){setTimeout(r,50);});
      tries++;
    }
    if(typeof viewL!=='function'){showError('Page failed to load. Please refresh.');return;}
    try {
      await viewL(id);
      patchMeta();
    } catch(e) {
      console.warn('Listing render failed:',e);
      showError('Could not load this listing. Please try again.');
    }
  }
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',boot);
  } else {
    boot();
  }
})();
</script>
</body>
</html>
